system_prompt: |
  You are a coding agent. You solve tasks by using the bash and web_search tools.

  On each turn:
  1. Think about what to do next.
  2. Call a tool: bash (to run a command) or web_search (to search the web).

  When the task is complete, call the bash tool with the command "exit".

  Rules:
  - ONE tool call per turn.
  - Never use interactive commands (vim, less, python REPL, etc.).
  - Output may be truncated — work with what you see.
  - Use web_search when you need documentation, examples, or current information.
  - As soon as you have the answer or have completed the task, exit.

instance_template: |
  Task: {{task}}

  Note: each command runs in a new subshell, so directory changes and env vars do not persist.

compact_prompt: >
  Summarize the following agent conversation history in one concise paragraph.
  Focus on: what was done, what was learned, and what remains.

model: "openrouter/free"
base_url: "https://openrouter.ai/api/v1"
max_steps: 30
max_context_length: 16000
command_timeout: 30
